---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik

resources:
- ../../cluster/base/namespaces/traefik
- base

helmCharts:
  - name: traefik
    includeCRDs: true
    version: 40.3.0
    valuesFile: overlays/values.yaml
    repo: https://traefik.github.io/charts
    namespace: traefik
    releaseName: traefik

