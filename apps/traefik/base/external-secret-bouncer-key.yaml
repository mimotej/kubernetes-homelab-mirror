---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: traefik-bouncer-key
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  data:
  - secretKey: traefik-bouncer-key
    remoteRef:
      key: "traefik-bouncer-key"
