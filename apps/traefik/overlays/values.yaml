ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik-dashboard.internal`)
    entryPoints:
      - web
deployment:
  kind: DaemonSet
providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngress:
    enabled: true
gateway:
  listeners:
    web:
      namespacePolicy:
        from: All
service:
  spec:
    externalTrafficPolicy: Local
ports:
  web:
    asDefault: true
  web-external:
    asDefault: false
    port: 8088
    exposedPort: 8088
    expose:
      default: true
    protocol: TCP
    http:
      redirections:
        entryPoint:
          to: websecure-external
          scheme: https
          permanent: true
  websecure-external:
    asDefault: false
    port: 8444
    expose:
      default: true
    exposedPort: 8444
    protocol: TCP
    allowACMEByPass: false
    http3:
      enabled: false
    forwardedHeaders:
        # -- Trust forwarded headers information (X-Forwarded-*).
      trustedIPs: []
      insecure: false
      # -- Disable appending RemoteAddr to X-Forwarded-For header (v3.7+).
      notAppendXForwardedFor: false
    proxyProtocol:
      # -- Enable the Proxy Protocol header parsing for the entry point
      trustedIPs: []
      insecure: false
    # @default -- nil
logs:
  access:
    enabled: true
    format: json
    fields:
      defaultMode: keep
      names:
        ServiceName: keep
  general:
    level: INFO
    format: json

additionalArguments:
  - --accesslog=true
  - --accesslog.format=json
  - --entrypoints.web.proxyProtocol=true
  - --entrypoints.websecure.proxyProtocol=true
  - --entrypoints.websecure-external.proxyProtocol=true
  - --entrypoints.web.proxyProtocol.trustedIPs=10.0.0.0/8,10.0.0.4/16
  - --entrypoints.websecure.proxyProtocol.trustedIPs=10.0.0.0/8,10.0.0.4/16
  - --entrypoints.websecure-external.proxyProtocol.trustedIPs=10.0.0.0/8,10.0.0.4/16
  - --providers.kubernetescrd.allowCrossNamespace=true

volumes:
  - name: traefik-bouncer-key
    mountPath: /secrets/traefik-bouncer-key
    type: secret
experimental:
  plugins:
    crowdsec-bouncer-traefik-plugin:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.5.1"
    geoblock-plugin:
      moduleName: "github.com/PascalMinder/GeoBlock"
      version: "v0.2.2"
    traefik-oidc-auth:
      moduleName: "github.com/sevensolutions/traefik-oidc-auth"
      version: "v0.19.0"
