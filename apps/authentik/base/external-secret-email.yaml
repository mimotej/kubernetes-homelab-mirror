---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-email-external-secret
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  data:
  - secretKey: EMAIL_HOST
    remoteRef:
      key: "authentik-email-host"
  - secretKey: EMAIL_USER
    remoteRef:
      key: "authentik-email-username"
  - secretKey: EMAIL_PASSWORD
    remoteRef:
      key: "authentik-email-password"
