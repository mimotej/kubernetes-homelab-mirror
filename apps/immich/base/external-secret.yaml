---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-credentials
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  data:
  - secretKey: db-username
    remoteRef:
      key: "immich-db-username"
  - secretKey: db-password
    remoteRef:
      key: "immich-db-password"

