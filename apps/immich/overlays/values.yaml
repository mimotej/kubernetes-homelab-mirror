## This chart relies on the common library chart from bjw-s
## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-4.3.0/charts/library/common
## Refer there for more detail about the supported values

# These entries are shared between all the Immich components

controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME: "immich-db-postgresql.immich.svc.cluster.local"
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-credentials
                key: db-username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-db-credentials
                key: db-password
          DB_DATABASE_NAME: "immich"
          TZ: "Europe/Prague"
        image:
          tag: v3.0.3
immich:
  persistence:
    # Main data store for all photos shared between different components.
    library:
      # Automatically creating the library volume is not supported by this chart
      # You have to specify an existing PVC to use
      existingClaim: pvc-immich-library
# Dependencies

valkey:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/valkey/valkey
            tag: 9.1-alpine@sha256:355ae2c6c965769a0d9b9810711e6befd5b79fe676d1faa848247733ad6a4408
            pullPolicy: IfNotPresent

  persistence:
    data:
      enabled: true
      size: 1Gi
      # Optional: Set this to persistentVolumeClaim to keep job queues persistent
      type: emptyDir
      accessMode: ReadWriteOnce

# Immich components

server:
  enabled: true
  service:
    main:
      type: ClusterIP
  controllers:
    main:
      pod:
        nodeSelector:
          platform: n100
      containers:
        main:
          securityContext:
            privileged: true
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
  persistence:
    graphics:
      enabled: true
      type: hostPath
      hostPath: /dev/dri


machine-learning:
  enabled: true
  controllers:
    main:
      pod:
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: platform
                      operator: In
                      values:
                        - proxmox
      containers:
        main:
          securityContext:
            privileged: true
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            tag: v3.0.3-openvino
            pullPolicy: IfNotPresent
          env:
            TRANSFORMERS_CACHE: /cache
            HF_XET_CACHE: /cache/huggingface-xet
            MPLCONFIGDIR: /cache/matplotlib-config
  persistence:
    graphics:
      enabled: true
      type: hostPath
      hostPath: /dev/dri
    cache:
      enabled: true
      size: 10Gi
      # Optional: Set this to persistentVolumeClaim to avoid downloading the ML models every start.
      type: emptyDir
      accessMode: ReadWriteMany
      # storageClass: your-class


