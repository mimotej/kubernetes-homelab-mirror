postgresqlDataDir: /var/lib/postgresql/data
global:
  security:
    allowInsecureImages: true
auth:
  database: immich
  username: postgres
  existingSecret: immich-db-credentials
  secretKeys:
    userPasswordKey: db-password

image:
  registry: ghcr.io
  repository: immich-app/postgres
  tag: "16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4"

primary:
  resourcesPreset: none
  extraEnvVars:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: immich-db-credentials
          key: db-password
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: immich-db-credentials
          key: db-username
    - name: POSTGRES_DB
      value: immich
    - name: POSTGRES_INITDB_ARGS
      value: "--data-checksums"
  persistence:
    existingClaim: pvc-postgres-immich
    mountPath: /var/lib/postgresql/data
  containerSecurityContext:
    readOnlyRootFilesystem: false


