postgresqlDataDir: /var/lib/postgresql/data
global:
  security:
    allowInsecureImages: true
auth:
  database: immich
  username: postgres
  existingSecret: immich-db-credentials
  secretKeys:
    userPasswordKey: db-password

image:
  registry: ghcr.io
  repository: immich-app/postgres
  tag: "14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23"

primary:
  resourcesPreset: none
  extraEnvVars:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: immich-db-credentials
          key: db-password
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: immich-db-credentials
          key: db-username
    - name: POSTGRES_DB
      value: immich
    - name: POSTGRES_INITDB_ARGS
      value: "--data-checksums"
  persistence:
    existingClaim: pvc-postgres-immich
    mountPath: /var/lib/postgresql/data
  containerSecurityContext:
    readOnlyRootFilesystem: false


