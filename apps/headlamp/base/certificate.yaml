apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp
spec:
  secretName: headlamp-tls        # <===  Name of secret where the generated certificate will be stored.
  dnsNames:
    - "headlamp.mimotej.stream"
  issuerRef:
    name: dns-challenge-issuer-prod
    kind: ClusterIssuer
