maxRunners: 2
minRunners: 1
controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller
containerMode:
  type: kubernetes
  kubernetesModeWorkVolumeClaim:
    accessModes: ["ReadWriteOnce"]
    storageClassName: local-path
    resources:
      requests:
        storage: 5Gi
runnerScaleSetName: "selfhosted-kubernetes"
githubConfigUrl: "https://github.com/mimotej/kubernetes-homelab-mirror"
githubConfigSecret: "gh-app-credentials"
template: 
  spec:
    securityContext:
      fsGroup: 123
      runAsUser: 1000
      runAsGroup: 1000
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.335.1
        command: ["/home/runner/run.sh"]
        env:
          - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
            value: "false"
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
        volumeMounts:
          - name: terraform-states
            mountPath: /terraform-states
          - name: additional-data
            mountPath: /additional-data
    volumes:
      - name: terraform-states
        persistentVolumeClaim:
          claimName: pvc-arc-homelab-terraform-states
      - name: additional-data
        persistentVolumeClaim:
          claimName: pvc-arc-homelab-additional-data

