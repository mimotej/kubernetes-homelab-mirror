apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-arc-homelab-additional-data
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    path: "/nfs/storage/additional-data-gh-runners"
    server: "10.0.0.4"
    readOnly: false
