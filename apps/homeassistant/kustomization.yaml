---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homeassistant

resources:
- base
- ../../cluster/base/namespaces/homeassistant

helmGlobals:
  chartHome: .
helmCharts:
- name: homeassistant
  version: 0.1.0
  namespace: homeassistant
  releaseName: homeassistant
  includeCRDs: true
