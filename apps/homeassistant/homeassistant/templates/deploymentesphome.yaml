{{- if .Values.esphome.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homeassistant.fullname" . }}-esphome
  labels:
    {{- include "homeassistant.labels" . | nindent 4 }}
    {{- with .Values.esphome.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.esphome.replicaCount }}
  selector:
    matchLabels:
      {{- include "homeassistant.selectorLabels" . | nindent 6 }}
      {{- with .Values.esphome.selectorLabels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- include "homeassistant.labels" . | nindent 8 }}
        {{- with .Values.esphome.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .Values.hostNetwork.enabled | default false }}
      containers:
        - name: {{ .Chart.Name }}-esphome
          image: "{{ .Values.esphome.image.repository | default "ghcr.io/esphome/esphome" }}:{{ .Values.esphome.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: esphome
              containerPort: {{ .Values.service.port | default 6052 }}
              protocol: TCP
          {{- with .Values.esphome.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.esphome.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.esphome.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /config
              name: {{ include "homeassistant.fullname" . }}-esphome-config-pvc
            - mountPath: /etc/localtime
              name: localtime
              readOnly: true
      volumes:
          - name: localtime
            hostPath:
              path: /etc/localtime
        {{- if and .Values.esphome.persistence.enabled (not .Values.esphome.persistence.existingClaim) (not .Values.esphome.persistence.nfs) }}
          - name: {{ include "homeassistant.fullname" . }}-esphome-config-pvc
            persistentVolumeClaim:
              claimName: {{ include "homeassistant.fullname" . }}-esphome-config-pvc
        {{- else if and .Values.esphome.persistence.enabled .Values.esphome.persistence.nfs }}
          - name: {{ include "homeassistant.fullname" . }}-esphome-config-pvc
            nfs:
              server: {{ .Values.esphome.persistence.nfs.server }}
              path: {{ .Values.esphome.persistence.nfs.path }}
        {{- else if .Values.esphome.persistence.enabled }}
          - name: {{ include "homeassistant.fullname" . }}-esphome-config-pvc
            persistentVolumeClaim:
              claimName: {{ .Values.esphome.persistence.existingClaim }}
        {{- else }}
          - name: config
            emptyDir: {}
        {{- end }}
      {{- with .Values.esphome.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.esphome.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.esphome.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
